<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @page { size: A6; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 13px;
    line-height: 1.5;
    color: #1a1a1a;
    background: #fff;
    padding: 16px;
  }

  .thread-header {
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid #333;
  }

  .thread-header h1 {
    font-size: 15px;
    font-weight: 700;
  }

  p {
    padding: 5px 8px;
    margin: 0;
    font-size: 13px;
    line-height: 1.5;
    word-wrap: break-word;
  }

  p:nth-child(odd) {
    background: #f6f6f8;
  }
</style>
</head>
<body>
<div class="thread-header">
  <h1>$title$</h1>
</div>
$body$
</body>
</html>
